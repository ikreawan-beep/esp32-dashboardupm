<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Load Cell Monitoring System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#f57c00;
  --primary-dark:#e65100;
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#2c2c2c;
  --muted:#777;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ================= LOGIN ================= */

#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#f57c00,#ffcc80);
}

.login-wrapper{
  width:420px;
  background:white;
  padding:50px 45px;
  border-radius:20px;
  box-shadow:0 30px 60px rgba(0,0,0,.15);
  animation:fadeUp .6s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:6px;
}

.subtitle{
  font-size:14px;
  color:var(--muted);
  margin-bottom:30px;
}

.input-group{
  margin-bottom:18px;
}

.input-group input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
  transition:.2s;
}

.input-group input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(245,124,0,.15);
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  background:var(--primary-dark);
}

.register{
  text-align:center;
  margin-top:20px;
  font-size:14px;
}

.register a{
  color:var(--primary);
  font-weight:600;
  text-decoration:none;
}

#errorMsg{
  margin-top:10px;
  font-size:13px;
  color:#e53935;
  text-align:center;
}

/* ================= DASHBOARD ================= */

#dashboardPage{
  display:none;
}

.topbar{
  height:65px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.brand{
  font-weight:700;
  font-size:18px;
}

.logout{
  background:#e53935;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
}

.container{
  padding:30px;
  max-width:1200px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:18px;
  box-shadow:0 15px 30px rgba(0,0,0,.05);
}

.card h4{
  margin:0;
  font-size:14px;
  color:var(--muted);
  margin-bottom:10px;
}

.value{
  font-size:36px;
  font-weight:700;
  color:var(--primary);
}

.chart-card{
  margin-top:5px;
}

.top-info{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
  margin-bottom:20px;
}

.double-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-wrapper">
    <div class="logo">Load Cell Monitoring</div>
    <div class="subtitle">Secure access to your monitoring dashboard</div>

    <div class="input-group">
      <input id="email" type="email" placeholder="Email address">
    </div>

    <div class="input-group">
      <input id="password" type="password" placeholder="Password">
    </div>

    <button class="btn" onclick="login()">Sign In</button>

    <div class="register">
      Don't have an account?
      <a href="register.html">Create Account</a>
    </div>

    <div id="errorMsg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage">

  <div class="topbar">
    <div class="brand">Load Cell Monitoring System</div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="container">

  <!-- USER NAME -->
  <div class="card">
    <h4>Logged in User</h4>
    <div class="value" style="font-size:20px;" id="userName">--</div>
  </div>

  <!-- SERIAL + ERA -->
  <div class="double-grid" style="margin-top:20px;">
    
    <div class="card">
      <h4>Device Serial</h4>
      <input id="serialInput" type="text" 
        style="width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;">
    </div>

    <div class="card">
      <h4>ERA (cm²)</h4>
      <input id="eraInput" type="number" value="5" step="0.1"
        style="width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;">
    </div>

  </div>

  <!-- WEIGHT + POWER -->
  <div class="double-grid" style="margin-top:20px;">
    <div class="card">
      <h4>Weight (g)</h4>
      <div class="value" id="weight">--</div>
    </div>

    <div class="card">
      <h4>Power (W)</h4>
      <div class="value" id="power">--</div>
    </div>
  </div>
  <div class="card" style="margin-top:20px;">
  <h4>Daily Calibration</h4>
    <div class="card">
  <h4>Intensity (W/cm²)</h4>
  <div class="value" id="intensity">--</div>
  </div>

  <div style="margin-bottom:10px;">
    <label>Reference Intensity (W/cm²)</label>
    <input id="referenceInput" type="number" step="0.001" value="0.130"
      style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;">
  </div>

  <button onclick="saveCalibration()"
    style="padding:12px 18px;border:none;border-radius:10px;background:#2e7d32;color:white;cursor:pointer;">
    Save Calibration
  </button>

  <div id="calStatus" style="margin-top:10px;font-weight:600;"></div>
  </div>

  <!-- CHART + HISTORY -->
  <div class="double-grid" style="margin-top:20px;">

    <div class="card">
      <h4>Real-Time Weight Trend</h4>
      <canvas id="chart"></canvas>
    </div>

    <div class="card">
  <h4>History</h4>

  <div style="margin-bottom:10px;">
    <label>Serial</label>
    <input id="searchSerial" type="text"
      style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;">
  </div>

  <div style="display:flex;gap:10px;margin-bottom:10px;">
    <div style="flex:1;">
      <label>From</label>
      <input id="fromDate" type="date"
        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;">
    </div>
    <div style="flex:1;">
      <label>To</label>
      <input id="toDate" type="date"
        style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;">
    </div>
  </div>

  <button onclick="searchHistory()"
    style="padding:8px 12px;border:none;background:#1976d2;color:white;border-radius:6px;">
    Search
  </button>

  <div id="historyList" style="margin-top:15px;max-height:350px;overflow:auto;"></div>
</div>


  </div>

</div>






<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBcncIM475zAeF4hmvnkE_Dpsii53mcCU",
  authDomain: "ultrasound-watt-meter.firebaseapp.com",
  databaseURL: "https://ultrasound-watt-meter-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ultrasound-watt-meter",
  storageBucket: "ultrasound-watt-meter.firebasestorage.app",
  messagingSenderId: "508236173257",
  appId: "1:508236173257:web:db39c8714d05c9380ea218",
  measurementId: "G-S60BJ0TYM2"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(err=> errorMsg.innerText=err.message);
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    loginPage.style.display="none";
    dashboardPage.style.display="block";
    startApp();
  }else{
    loginPage.style.display="flex";
    dashboardPage.style.display="none";
  }
});

function startApp(){
  userName.innerText = auth.currentUser.email;
  const chartObj = new Chart(chart,{
  type:"line",
  data:{
    labels:[],
    datasets:[{
      data:[],
      borderColor:"#f57c00",
      tension:.4,
      fill:false
    }]
  },
  options:{
    responsive:true,
    animation:{
      duration:500,
      easing:'easeOutQuart'
    },
    scales:{
      x:{
        ticks:{ maxTicksLimit:6 }
      },
      y:{
        beginAtZero:true
      }
    },
    plugins:{
      legend:{ display:false }
    }
  }
 });


  db.ref("loadcell/weight").on("value",snap=>{
    const w = snap.val() || 0;
    weight.innerText = w.toFixed(2);

    const time = new Date().toLocaleTimeString();

    chartObj.data.labels.push(time);
    chartObj.data.datasets[0].data.push(w);

    if(chartObj.data.labels.length>20){
      chartObj.data.labels.shift();
      chartObj.data.datasets[0].data.shift();
    }

    chartObj.update();
  });

  db.ref("loadcell/power").on("value",snap=>{
    const p = snap.val() || 0;
    power.innerText = p.toFixed(2);
    updateIntensity();
  });
  function loadHistory(serial){

  historyList.innerHTML = "Loading...";

  db.ref("calibration_logs/"+serial)
    .limitToLast(20)
    .on("value", snap => {

      historyList.innerHTML = "";

      if(!snap.exists()){
        historyList.innerHTML = "No calibration records.";
        return;
      }

      snap.forEach(child => {

        const data = child.val();
        const timestamp = child.key;

        const item = document.createElement("div");
        item.style.padding="8px 0";
        item.style.borderBottom="1px solid #eee";

        if(data.status === "FAIL"){
          item.style.background = "#ffe6e6";
        }

        item.innerHTML = `
          <div><b>${timestamp}</b></div>
          <div style="font-size:13px;">
            ${data.intensity} W/cm² 
            (${data.status})
          </div>
          <div style="font-size:12px;color:#777;">
            User: ${data.user}
          </div>
        `;

        historyList.prepend(item);

      });

  });

}

}
function saveCalibration(){

  const serial = serialInput.value.trim();
  if(!serial){
    alert("Please enter Serial");
    return;
  }

  const weightVal = parseFloat(weight.innerText) || 0;
  const powerVal = parseFloat(power.innerText) || 0;
  const eraVal = parseFloat(eraInput.value) || 1;
  const referenceVal = parseFloat(referenceInput.value) || 0;

  const intensity = powerVal / eraVal;

  // tolerance 5%
  const tolerance = 0.05;
  const min = referenceVal * (1 - tolerance);
  const max = referenceVal * (1 + tolerance);

  const status = (intensity >= min && intensity <= max) ? "PASS" : "FAIL";

  const now = new Date();
  const timestamp =
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,'0') + "-" +
    String(now.getDate()).padStart(2,'0') + "_" +
    String(now.getHours()).padStart(2,'0') + "-" +
    String(now.getMinutes()).padStart(2,'0') + "-" +
    String(now.getSeconds()).padStart(2,'0');

  const logData = {
    user: auth.currentUser.email,
    weight: weightVal,
    power: powerVal,
    era: eraVal,
    intensity: parseFloat(intensity.toFixed(3)),
    reference: referenceVal,
    status: status
  };

  db.ref("calibration_logs/"+serial+"/"+timestamp).set(logData);

  calStatus.innerText = "Calibration Saved → " + status;
  calStatus.style.color = status === "PASS" ? "green" : "red";

}
function updateIntensity(){

  const powerVal = parseFloat(power.innerText) || 0;
  const eraVal = parseFloat(eraInput.value) || 1;

  const result = powerVal / eraVal;

  intensity.innerText = result.toFixed(3);
}
function searchHistory(){

  const serial = searchSerial.value.trim();
  const from = fromDate.value;
  const to = toDate.value;

  if(!serial){
    alert("Please enter Serial");
    return;
  }

  let startKey = null;
  let endKey = null;

  if(from){
    startKey = from + "_00-00-00";
  }

  if(to){
    endKey = to + "_23-59-59";
  }

  let query = db.ref("calibration_logs/"+serial).orderByKey();

  if(startKey){
    query = query.startAt(startKey);
  }

  if(endKey){
    query = query.endAt(endKey);
  }

  historyList.innerHTML = "Loading...";

  query.once("value").then(snap=>{

    historyList.innerHTML = "";

    if(!snap.exists()){
      historyList.innerHTML = "No records found.";
      return;
    }

    snap.forEach(child=>{

      const key = child.key;
      const data = child.val();

      const div = document.createElement("div");
      div.style.border="1px solid #ddd";
      div.style.padding="10px";
      div.style.marginBottom="8px";
      div.style.borderRadius="8px";
      div.style.background="#fff";

      if(data.status === "FAIL"){
        div.style.background="#ffe6e6";
      }

      div.innerHTML = `
        <strong>${key}</strong><br>
        User: ${data.user}<br>
        Weight: ${data.weight} g<br>
        Power: ${data.power} W<br>
        ERA: ${data.era} cm²<br>
        Intensity: ${data.intensity} W/cm²<br>
        Reference: ${data.reference} W/cm²<br>
        Status: <b>${data.status}</b>
      `;

      historyList.prepend(div);

    });

  });

}
 
</script>


</body>
</html>
